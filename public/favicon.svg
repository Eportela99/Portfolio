<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>
  <!-- > prompt in cyan -->
  <polyline points="5,11 12,16 5,21" fill="none" stroke="#00d4ff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor in purple -->
  <line x1="15" y1="22" x2="27" y2="22" stroke="#7c3aed" stroke-width="2.8" stroke-linecap="round"/>
</svg>
